<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#080d1a"/>

  <!-- Outer glow ring -->
  <rect x="32" y="32" width="448" height="448" rx="80" fill="none" stroke="#06b6d4" stroke-width="4" opacity="0.3"/>

  <!-- Calendar body -->
  <rect x="80" y="130" width="352" height="290" rx="18" fill="#0f1729"/>
  <rect x="80" y="130" width="352" height="290" rx="18" fill="none" stroke="#1e3a5f" stroke-width="2"/>

  <!-- Calendar header bar -->
  <rect x="80" y="130" width="352" height="72" rx="18" fill="#06b6d4"/>
  <rect x="80" y="180" width="352" height="22" fill="#06b6d4"/>

  <!-- Calendar title text (RS) -->
  <text x="154" y="181" font-family="'Segoe UI',Arial,sans-serif" font-size="40" font-weight="900" fill="#080d1a" letter-spacing="2">RS</text>

  <!-- Year badge -->
  <rect x="300" y="148" width="100" height="28" rx="6" fill="rgba(0,0,0,0.25)"/>
  <text x="350" y="167" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">2026</text>

  <!-- Day dots header -->
  <g opacity="0.6">
    <circle cx="124" cy="230" r="6" fill="#94a3b8"/>
    <circle cx="172" cy="230" r="6" fill="#94a3b8"/>
    <circle cx="220" cy="230" r="6" fill="#94a3b8"/>
    <circle cx="268" cy="230" r="6" fill="#94a3b8"/>
    <circle cx="316" cy="230" r="6" fill="#94a3b8"/>
    <circle cx="364" cy="230" r="6" fill="#f59e0b"/>
    <circle cx="412" cy="230" r="6" fill="#ef4444" opacity="0.8"/>
  </g>

  <!-- Calendar grid row 1 -->
  <rect x="108" y="254" width="32" height="32" rx="6" fill="#16213e"/>
  <rect x="156" y="254" width="32" height="32" rx="6" fill="#16213e"/>
  <rect x="204" y="254" width="32" height="32" rx="6" fill="#06b6d4" opacity="0.9"/>
  <rect x="252" y="254" width="32" height="32" rx="6" fill="#16213e"/>
  <rect x="300" y="254" width="32" height="32" rx="6" fill="#3b4fd0" opacity="0.8"/>
  <rect x="348" y="254" width="32" height="32" rx="6" fill="#16213e"/>
  <rect x="396" y="254" width="32" height="32" rx="6" fill="#16213e"/>

  <!-- Calendar grid row 2 -->
  <rect x="108" y="298" width="32" height="32" rx="6" fill="#d97706" opacity="0.75"/>
  <rect x="156" y="298" width="32" height="32" rx="6" fill="#16213e"/>
  <rect x="204" y="298" width="32" height="32" rx="6" fill="#16213e"/>
  <rect x="252" y="298" width="32" height="32" rx="6" fill="#7c3aed" opacity="0.75"/>
  <rect x="300" y="298" width="32" height="32" rx="6" fill="#16213e"/>
  <rect x="348" y="298" width="32" height="32" rx="6" fill="#06b6d4" opacity="0.9"/>
  <rect x="396" y="298" width="32" height="32" rx="6" fill="#16213e"/>

  <!-- Calendar grid row 3 -->
  <rect x="108" y="342" width="32" height="32" rx="6" fill="#16213e"/>
  <rect x="156" y="342" width="32" height="32" rx="6" fill="#3b4fd0" opacity="0.8"/>
  <rect x="204" y="342" width="32" height="32" rx="6" fill="#16213e"/>
  <rect x="252" y="342" width="32" height="32" rx="6" fill="#16213e"/>
  <rect x="300" y="342" width="32" height="32" rx="6" fill="#d97706" opacity="0.75"/>
  <rect x="348" y="342" width="32" height="32" rx="6" fill="#16213e"/>
  <rect x="396" y="342" width="32" height="32" rx="6" fill="#7c3aed" opacity="0.75"/>

  <!-- Clip pins -->
  <rect x="178" y="104" width="24" height="56" rx="12" fill="#1e3a5f" stroke="#06b6d4" stroke-width="2.5"/>
  <rect x="310" y="104" width="24" height="56" rx="12" fill="#1e3a5f" stroke="#06b6d4" stroke-width="2.5"/>
  <rect x="184" y="108" width="12" height="44" rx="6" fill="#06b6d4" opacity="0.4"/>
  <rect x="316" y="108" width="12" height="44" rx="6" fill="#06b6d4" opacity="0.4"/>

  <!-- Accent star/burst bottom right -->
  <circle cx="392" cy="390" r="26" fill="#f59e0b" opacity="0.15"/>
  <circle cx="392" cy="390" r="14" fill="#f59e0b" opacity="0.4"/>
  <text x="392" y="397" font-family="Arial" font-size="14" font-weight="900" fill="#f59e0b" text-anchor="middle">AR</text>
</svg>
